<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Vela app icon — ANIMATED "face" edition. The owner's edited mark reads as
  a face (tag-sails = eyes, holes = pupils, hull = smile), so this copy
  leans in: the pupils glance around, the gold eye winks, the smile grins.
  • Geometry is identical to vela-app-icon.svg (owner's edit); the tag
    holes are separate white circles here so the pupils can move — on the
    white tile that renders identically to a true cutout.
  • Pure CSS inside the SVG → animates even in <img>; ~6s loop;
    prefers-reduced-motion gets the still logo.
-->
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vm-front" gradientUnits="userSpaceOnUse" x1="312" y1="70" x2="244" y2="316" gradientTransform="matrix(0.74,0,0,0.74,60,88)">
      <stop offset="0" stop-color="#FACC15"/>
      <stop offset="0.42" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FF2E4D"/>
    </linearGradient>
    <linearGradient id="vm-back" gradientUnits="userSpaceOnUse" x1="184" y1="116" x2="124" y2="316" gradientTransform="matrix(0.74,0,0,0.74,66.205656,85.264781)">
      <stop offset="0" stop-color="#FF2E4D"/>
      <stop offset="0.55" stop-color="#A31234"/>
      <stop offset="1" stop-color="#7F1D3B"/>
    </linearGradient>
    <linearGradient id="vm-hull" gradientUnits="userSpaceOnUse" x1="56" y1="390" x2="452" y2="360" gradientTransform="matrix(0.74,0,0,0.74,66,66)">
      <stop offset="0" stop-color="#7F1D3B"/>
      <stop offset="0.3" stop-color="#A31234"/>
      <stop offset="0.62" stop-color="#FF2E4D"/>
      <stop offset="0.86" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
  </defs>

  <style>
    .eye, .pupil, .smile, .face { transform-box: fill-box; }
    .face  { transform-origin: 50% 60%; animation: v-bob 6s ease-in-out infinite; }
    .pupil { animation: v-look 6s ease-in-out infinite; }
    .eye-front { transform-origin: 50% 82%; animation: v-wink 6s ease-in-out infinite; }
    .pupil-front { animation: v-look 6s ease-in-out infinite, v-pupil-hide 6s linear infinite; }
    .smile { transform-origin: 50% 20%; animation: v-grin 6s cubic-bezier(.34,1.56,.64,1) infinite; }

    @keyframes v-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    /* glance right, glance left, back to centre */
    @keyframes v-look {
      0%, 20%   { transform: translate(0, 0); }
      27%, 38%  { transform: translate(10px, 1.5px); }
      45%, 57%  { transform: translate(-9px, 1.5px); }
      64%, 100% { transform: translate(0, 0); }
    }
    /* the gold eye winks */
    @keyframes v-wink {
      0%, 71%   { transform: scaleY(1); }
      75%, 77%  { transform: scaleY(0.1); }
      82%, 100% { transform: scaleY(1); }
    }
    @keyframes v-pupil-hide {
      0%, 71%   { opacity: 1; }
      73%, 80%  { opacity: 0; }
      82%, 100% { opacity: 1; }
    }
    /* the smile grins wider on the wink */
    @keyframes v-grin {
      0%, 68%   { transform: scale(1, 1) translateY(0); }
      76%       { transform: scale(1.05, 0.93) translateY(-3px); }
      86%, 100% { transform: scale(1, 1) translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .face, .pupil, .eye-front, .pupil-front, .smile { animation: none; }
    }
  </style>

  <rect width="512" height="512" rx="115" fill="#FFFFFF"/>
  <rect width="512" height="512" rx="115" fill="none" stroke="#2A1D22" stroke-opacity="0.06" stroke-width="4"/>

  <g class="face">
    <!-- back eye (wine tag) — hole is a movable white pupil -->
    <g class="eye eye-back">
      <path fill="url(#vm-back)" d="m 206.06641,157.78516 c -7.4,0.98666 -12.58102,6.90643 -15.54102,17.75976 -15.54,41.44 -26.64008,88.80047 -31.08008,130.98047 -0.34742,2.20037 -0.42285,4.14234 -0.22656,5.82617 32.5269,-0.23634 57.25986,0.70925 77.11914,1.91797 1.21727,-2.54948 1.73293,-5.8717 1.54688,-9.96484 -0.74,-37 -4.43985,-87.3193 -11.83985,-127.2793 -0.98666,-7.4 -3.94557,-12.33411 -8.8789,-14.80078 z"/>
      <circle class="pupil" cx="208.29" cy="192.57" r="6.66" fill="#FFFFFF"/>
    </g>

    <!-- front eye (gold tag) — this one winks -->
    <g class="eye eye-front">
      <path fill="url(#vm-front)" d="M 284.96094 129.43945 C 276.08094 131.41279 270.15922 138.81397 267.19922 151.64062 C 255.35922 201.96062 246.47906 262.6393 242.03906 307.7793 C 241.6825 310.27524 241.64262 312.47062 241.91602 314.36523 C 284.64641 317.02933 304.58109 320.82939 331.95898 316.25391 C 333.04355 313.65354 333.41149 310.33666 333.06055 306.30078 C 331.58055 271.52078 323.44086 209.35914 309.38086 153.11914 C 307.90086 143.74581 304.1993 137.57914 298.2793 134.61914 L 284.96094 129.43945 z"/>
      <circle class="pupil pupil-front" cx="288.25" cy="164.96" r="7.02" fill="#FFFFFF"/>
    </g>

    <!-- the smile -->
    <path class="smile" fill="url(#vm-hull)" d="m 108.92,317.6 c 168.54958,-6.53405 179.08,14.8 239.76,-1.48 l 8.88,-2.96 c 2.96,-0.98667 3.94667,-2.96 2.96,-5.92 l -4.44,-10.36 c -0.98667,-3.94667 0.49333,-4.68667 4.44,-2.22 l 35.52,17.02 c 3.45333,1.97333 3.45333,4.19333 0,6.66 -19.24,14.06 -42.92,28.86 -69.56,40.7 -44.4,19.24 -111,17.76 -150.96,2.96 -29.6,-11.84 -53.28,-28.12 -66.6,-44.4 z"/>
  </g>
</svg>
