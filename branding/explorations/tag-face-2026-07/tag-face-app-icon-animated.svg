<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Vela app icon — lightweight ANIMATED loop for plain <img> use.
  (Motion masters live in Remotion: src/compositions/LogoSting.tsx →
  branding/motion/. This SVG mirrors the owner's updated icon geometry.)
  Loop: frozen → pupils look at the camera → gold eye winks → frozen.
  prefers-reduced-motion shows the still logo.
-->
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vm-front" gradientUnits="userSpaceOnUse" x1="312" y1="70" x2="244" y2="316" gradientTransform="matrix(0.74,0,0,0.74,64,88)">
      <stop offset="0" stop-color="#FACC15"/><stop offset="0.42" stop-color="#F59E0B"/><stop offset="1" stop-color="#FF2E4D"/>
    </linearGradient>
    <linearGradient id="vm-back" gradientUnits="userSpaceOnUse" x1="184" y1="116" x2="124" y2="316" gradientTransform="matrix(0.74,0,0,0.74,62.205656,85.264781)">
      <stop offset="0" stop-color="#FF2E4D"/><stop offset="0.55" stop-color="#A31234"/><stop offset="1" stop-color="#7F1D3B"/>
    </linearGradient>
    <linearGradient id="vm-hull" gradientUnits="userSpaceOnUse" x1="56" y1="390" x2="452" y2="360" gradientTransform="matrix(0.74,0,0,0.74,66,66)">
      <stop offset="0" stop-color="#7F1D3B"/><stop offset="0.3" stop-color="#A31234"/><stop offset="0.62" stop-color="#FF2E4D"/><stop offset="0.86" stop-color="#F59E0B"/><stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
  </defs>

  <style>
    .pupil, .eye-front, .smile { transform-box: fill-box; }
    .pupil-b { animation: v-look-b 6s ease-in-out infinite; }
    .pupil-f { animation: v-look-f 6s ease-in-out infinite, v-hide 6s linear infinite; }
    .eye-front { transform-origin: 50% 92%; animation: v-wink 6s ease-in-out infinite; }
    .smile { transform-origin: 50% 25%; animation: v-grin 6s cubic-bezier(.34,1.56,.64,1) infinite; }
    @keyframes v-look-b {
      0%, 10%   { transform: translate(0,0) scale(1); }
      18%, 46%  { transform: translate(-7px,52px) scale(1.28); }
      56%, 100% { transform: translate(0,0) scale(1); }
    }
    @keyframes v-look-f {
      0%, 10%   { transform: translate(0,0) scale(1); }
      18%, 46%  { transform: translate(-3px,65px) scale(1.34); }
      56%, 100% { transform: translate(0,0) scale(1); }
    }
    @keyframes v-wink {
      0%, 26%   { transform: scaleY(1); }
      30%, 33%  { transform: scaleY(0.08); }
      38%, 100% { transform: scaleY(1); }
    }
    @keyframes v-hide {
      0%, 27%   { opacity: 1; }
      29%, 36%  { opacity: 0; }
      38%, 100% { opacity: 1; }
    }
    @keyframes v-grin {
      0%, 25%   { transform: scale(1,1); }
      31%       { transform: scale(1.05,0.93); }
      40%, 100% { transform: scale(1,1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pupil-b, .pupil-f, .eye-front, .smile { animation: none; }
    }
  </style>

  <rect width="512" height="512" rx="115" fill="#ffffff"/>
  <rect width="512" height="512" rx="115" fill="none" stroke="#2a1d22" stroke-opacity="0.06" stroke-width="4"/>

  <path class="smile" fill="url(#vm-hull)" d="m 108.92,317.6 c 144.85806,41.28771 215.49474,17.87112 240.19873,0.71366 L 357.56,313.16 c 2.66302,-1.62586 3.94667,-2.96 2.96,-5.92 l -4.44,-10.36 c -0.98667,-3.94667 0.49333,-4.68667 4.44,-2.22 l 35.52,17.02 c 3.45333,1.97333 3.45333,4.19333 0,6.66 -19.24,14.06 -42.92,28.86 -69.56,40.7 -44.4,19.24 -111,17.76 -150.96,2.96 -29.6,-11.84 -53.28,-28.12 -66.6,-44.4 z"/>

  <path fill="url(#vm-back)" d="M 200.05469 157.50391 C 193.44953 157.69956 189.30039 165.36993 186.52539 175.54492 C 170.98539 216.98492 159.88531 264.34539 155.44531 306.52539 C 155.28623 307.53292 155.21682 312.64987 155.20703 318.0625 C 185.01319 324.25978 210.92208 327.37311 233.29883 328.32227 C 233.8658 320.4423 234.02054 307.29177 233.88477 304.30469 C 233.14477 267.30469 229.44492 216.98539 222.04492 177.02539 C 221.05354 164.64719 215.6474 158.76474 201.4082 157.56641 C 200.9457 157.51153 200.49503 157.49086 200.05469 157.50391 Z"/>
  <circle class="pupil pupil-b" cx="201.95987" cy="192.9632" r="7.4455252" fill="#ffffff"/>

  <g class="eye-front">
    <path fill="url(#vm-front)" d="M 285.46875 130.56055 C 276.65295 130.23894 273.97422 139.61565 271.19922 151.64062 C 259.35922 201.96062 250.47906 262.6393 246.03906 307.7793 C 245.78716 309.54264 245.38441 321.14264 245.26562 328.46875 C 288.56511 329.83761 318.2132 323.00095 337.01953 314.99609 C 337.14629 310.97387 337.17482 307.61467 337.06055 306.30078 C 335.58055 271.52078 327.44086 209.35914 313.38086 153.11914 C 310.42621 134.49024 309.076 132.76018 287.31641 130.75586 C 286.67229 130.64612 286.05647 130.58199 285.46875 130.56055 Z"/>
    <circle class="pupil pupil-f" cx="294.40848" cy="166.90385" r="7.4455252" fill="#ffffff"/>
  </g>
</svg>
