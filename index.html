    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://instantshop.al/#organization",
          "name": "Vela",

        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://instantshop.al/#software",
          "name": "Vela",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://instantshop.al/",
          "publisher": { "@id": "https://instantshop.al/#organization" },

            {
              "@type": "Offer",
              "name": "Starter",
              "price": "0",
              "priceCurrency": "ALL",
              "description": "Free forever. Instagram storefront with up to 10 products and cash-on-delivery orders. No credit card."
            },
            {
              "@type": "Offer",
              "name": "Pro",
              "price": "1990",
              "priceCurrency": "ALL",
              "description": "Unlimited products, online card payments (RaiAccept), Storefront Studio and full analytics. 7-day free trial, no credit card."
            },
            {
              "@type": "Offer",
              "name": "Business",
              "price": "3990",
              "priceCurrency": "ALL",
              "description": "Everything in Pro plus priority support, advanced analytics and higher AI sync limits."
            }
          ]
        },
        {
          "@type": "FAQPage",
          "@id": "https://instantshop.al/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How does the 7-day free trial work?",
              "acceptedAnswer": { "@type": "Answer", "text": "Sign up and connect Instagram with no credit card. You get full Pro access for 7 days. When the trial ends, pick a plan to keep your shop online; otherwise your storefront goes offline, but your products are saved and return when you activate a plan." }
            },
            {
              "@type": "Question",
              "name": "Do I need a website or coding skills to sell on Instagram in Albania?",
              "acceptedAnswer": { "@type": "Answer", "text": "No. Vela turns your Instagram posts into a hosted online storefront automatically. You connect your account and share your shop link — no website or code needed." }
            },
            {
              "@type": "Question",
              "name": "How do customers pay?",
              "acceptedAnswer": { "@type": "Answer", "text": "You can accept secure card payments through Raiffeisen Bank Albania (RaiAccept) and/or cash on delivery. Prices are shown in Albanian Lek (ALL)." }
            },
            {
              "@type": "Question",
              "name": "How much does Vela cost?",
              "acceptedAnswer": { "@type": "Answer", "text": "Vela has a free-forever Starter plan for a catalogue of up to 10 products. Pro is 1,990 ALL/month (unlimited products and card payments) and Business is 3,990 ALL/month. Paid plans include a 7-day free trial with no credit card." }
            }
          ]
        }
