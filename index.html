    <!-- Warm up the connections every page needs before the JS asks for them:
         the Supabase API and the Google Fonts CDN (fonts load at runtime). -->
    <link rel="preconnect" href="https://hbsetjwlawuxasjbvpyx.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://wsrv.nl" />
    <!-- Brand fonts (was a render-blocking @import inside the bundled CSS).
         media="print" + onload makes the stylesheet NON-blocking: it downloads
         in parallel and applies the moment it arrives; display=swap means text
         renders instantly in the fallback font meanwhile. -->
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" /></noscript>
    <!-- Pinch zoom stays enabled (a11y); iOS input auto-zoom is prevented by
         16px form-control text on small screens (globals.css), not by locking scale. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta property="og:image" content="https://instantshop.al/demo/p1.jpg" />
    <meta property="og:locale" content="sq_AL" />
    <meta property="og:locale:alternate" content="en_US" />
    <!-- Twitter -->

    <meta name="twitter:title" content="Vela — Kthe Instagramin në dyqan online" />
    <meta name="twitter:description" content="Sistemi i kthen postimet e tua në dyqan të vërtetë. Provo falas 7 ditë." />
    <meta name="twitter:image" content="https://instantshop.al/demo/p1.jpg" />
    <!-- was (Instagram-era): #d62976 -->
    <meta name="theme-color" content="#a31234" />

    <!-- Splash pre-cover: on a first visit the (prerendered) landing painted a
         few frames before the React splash mounted — a visible flicker. This
         inline script covers the page in the theme background BEFORE first
         paint whenever the splash is about to show; SplashScreen removes it as
         soon as its own overlay is up. Failsafe timer so a failed JS load can
         never leave the page covered. -->
    <script>
      try {
        if (location.pathname === "/") {
          var dark = false;
          try { dark = localStorage.getItem("landing-theme") === "dark"; } catch (e) {}
          // The hero poster is the landing's LCP image (the film streams in
          // later) — preload the theme-matching one before the JS even parses.
          var pl = document.createElement("link");
          pl.rel = "preload"; pl.as = "image";
          pl.href = dark ? "/hero/hero-film-poster-dark.jpg" : "/hero/hero-film-poster.jpg";
          document.head.appendChild(pl);
          if (!sessionStorage.getItem("vela-splash-seen")) {
            document.documentElement.classList.add("pre-splash");
            if (dark) document.documentElement.classList.add("pre-splash-dark");
            setTimeout(function () {
              document.documentElement.classList.remove("pre-splash", "pre-splash-dark");
            }, 4000);
          }
        }
      } catch (e) {}
    </script>
    <style>
      /* The cover shows the mark (real content → FCP fires immediately) on the
         splash's own canvas, so hiding the page never blanks the paint metrics
         and the hand-off to the animated splash is seamless. */
      .pre-splash body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: #fbf6f4 url("/vela-icon.svg") center / clamp(72px, 17vw, 104px) no-repeat;
        z-index: 119; /* just under the splash overlay (z-120) */
      }
      .pre-splash.pre-splash-dark body::before { background-color: #140a0e; }
    </style>
