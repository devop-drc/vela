<!doctype html>
<html lang="sq">
<head>
<meta charset="utf-8">
<title>Row A — Manifesto</title>
<link rel="stylesheet" href="assets/feed.css">
<style>
  body { background:var(--dark); color:#F5F3F6; }

  /* soft ambient blobs bleeding across all three tiles */
  .blob { position:absolute; border-radius:999px; filter:blur(220px); }
  /* was: #C026D3 / #DB2777 / #F59E0B */
  .b1 { width:1200px; height:1200px; left:-380px; top:-560px; background:#7F1D3B; opacity:.5; }
  .b2 { width:1000px; height:1000px; left:1400px; top:-620px; background:#A31234; opacity:.35; }
  .b3 { width:1100px; height:1100px; right:-320px; top:-480px; background:#F59E0B; opacity:.2; }

  .top { position:absolute; top:88px; left:96px; right:96px; display:flex; justify-content:space-between; align-items:center; }
  .top .handle { font-size:34px; color:rgba(255,255,255,.75); font-weight:500; }
  .top .mark { font-size:26px; letter-spacing:.3em; color:rgba(255,255,255,.4); }

  .headline { position:absolute; left:0; right:0; top:340px; text-align:center; }
  .headline h1 { font-family:'Clash Display'; font-weight:600; letter-spacing:-0.02em; font-size:252px; line-height:1.04; color:#fff; }

  /* gradient band across the full row — the continuous element */
  .band { position:absolute; left:-40px; right:-40px; bottom:0; height:330px; transform:rotate(-1.2deg) translateY(52px); }
  .band .glow { position:absolute; inset:-70px 0; filter:blur(90px); opacity:.55; }
  .ship { position:absolute; right:640px; bottom:200px; width:230px; z-index:3;
          filter:drop-shadow(0 30px 60px rgba(0,0,0,.45)); }

  .chips { position:absolute; left:96px; bottom:120px; display:flex; gap:26px; z-index:3; }
  .chips .chip { border:2px solid rgba(255,255,255,.28); color:#fff; font-size:32px; padding:18px 40px; background:rgba(15,12,19,.35); backdrop-filter:blur(6px); }
  .cta { position:absolute; right:96px; bottom:120px; z-index:3; }
  .cta .chip { font-family:'Clash Display'; font-weight:600; color:#fff; font-size:36px; padding:22px 52px; background:rgba(15,12,19,.5); border:2px solid rgba(255,255,255,.5); }
</style>
</head>
<body>
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

  <div class="top">
    <span class="handle">@vela.al</span>
    <span class="mark eyebrow">VELA — DYQANI YT ONLINE</span>
  </div>

  <div class="headline">
    <h1>Kthe Instagramin<br><span class="brand-text">në dyqan online.</span></h1>
  </div>

  <div class="band">
    <div class="glow brand-gradient"></div>
    <div class="brand-gradient" style="position:absolute; inset:0; border-radius:52px 52px 0 0;"></div>
  </div>
  <img class="ship" src="assets/ship-white.svg" alt="">

  <div class="chips">
    <span class="chip">Pa kod</span>
    <span class="chip">Pagesa në Lekë</span>
    <span class="chip">Porositë në një panel</span>
  </div>
  <div class="cta"><span class="chip">Provo falas 7 ditë →</span></div>
</body>
</html>
